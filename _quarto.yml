project:
  type: website
  output-dir: docs
  render:
    - index.qmd
    - seminars/*.qmd
    - seminars/2026/*.qmd
    - workshops/*.qmd
    - workshops/2026/*.qmd

website:
  title: "AIEPS"
  description: "A special interest group for AI in Earth & Planetary Sciences"
  favicon: images/aieps.png

  navbar:
    title: "AIEPS"
    logo: images/aieps.png
    logo-alt: "AIEPS"
    background: light
    foreground: "#2d2d2d"
    left:
      - text: "About"
        href: index.qmd
      - text: "Workshops"
        menu:
          - text: "2026 "
            href: workshops/2026.qmd
          - text: "2025"
            href: workshops/2025.qmd
      - text: "Seminars"
        menu:
          - text: "2026"
            href: seminars/2026.qmd
          - text: "2025"
            href: seminars/2025.qmd
    right:
      - icon: github
        href: https://github.com/AI-EPS
        aria-label: GitHub

  back-to-top-navigation: true
  page-footer:
    center: "If you have any questions regarding anything on this website, send an email to pankaj dot mishra AT gtk.fi."

format:
  html:
    grid:
      body-width: 1000px
      margin-width: 260px
      gutter-width: 1.2rem
    theme:
      light:
        - flatly
        - styles.scss
    fontsize: 12.5pt
    linestretch: 1.1
    toc: true
    toc-location: right
    smooth-scroll: true
    include-after-body:
      text: |
        <script>
        document.addEventListener('DOMContentLoaded', function () {
          document.title = document.title
            .replace(/\s*[–—-]\s*AIEPS\s*$/, '')
            .replace(/\s*[–—-]\s*AI in Earth and Planetary Sciences\s*$/, '');
        });
        </script>
